apiVersion: v1
kind: Service
metadata:
  name: httpd-service
  namespace: default
  labels:
    app: httpd
spec:
  type: NodePort
  selector:
    app: httpd
  ports:
    - name: http
      protocol: TCP
      port: 81 # ClusterIP port
      targetPort: 80 # Container port
      nodePort: 30081 # Exposed port on the kind node (range: 30000-32767)
