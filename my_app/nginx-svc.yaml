apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: default
  labels:
    app: nginx
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - name: http
      protocol: TCP
      port: 80        # ClusterIP port
      targetPort: 80  # Container port
      nodePort: 30080 # Exposed port on the kind node (range: 30000-32767)
